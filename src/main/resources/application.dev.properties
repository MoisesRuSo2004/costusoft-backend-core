# ── Base de datos local ───────────────────────────────────────
# ── Base de datos (Supabase) ───────────────────────────────
spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.owomcxuxevxdzjnukdat
spring.datasource.password=costusoft2026@@
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — pool reducido para desarrollo
spring.datasource.hikari.pool-name=InventarioDev-Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ── JPA / Hibernate ───────────────────────────────────────────
# update: crea y actualiza tablas automaticamente en desarrollo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Logging detallado ────────────────────────────────────────
logging.level.com.inventario=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

