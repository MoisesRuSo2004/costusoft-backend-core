spring.application.name=inventory-system

# ================================================================
# APPLICATION BASE CONFIG
# Valores compartidos por todos los perfiles.
# Los valores sensibles y de conexion van en cada perfil.
# ================================================================

# Perfil activo por defecto — override con variable de entorno
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── JPA / Hibernate ──────────────────────────────────────────
# ddl-auto se define en cada perfil (update en dev, validate en prod)
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── Jackson ──────────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.time-zone=UTC

# ── Servidor ─────────────────────────────────────────────────
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html
server.compression.min-response-size=1024

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── JWT (valores reales en cada perfil) ──────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ── CORS (valores reales en cada perfil) ─────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
